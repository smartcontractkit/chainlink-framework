name: Golangci-lint

on: [pull_request]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.62.2

      - name: Find Go modules
        id: find-modules
        run: |
          modules=$(go list -m -json all | jq -r '.Dir')
          echo "modules=$modules" >> $GITHUB_ENV

      - name: Run golangci-lint for each module
        run: |
          failed_modules=""

          for module in ${{ env.modules }}; do
            echo "Running golangci-lint in $module"
            cd $module

            if ! golangci-lint run; then
              failed_modules="$failed_modules $module"
            fi

            cd -
          done

          if [ -n "$failed_modules" ]; then
            echo "The following modules failed linting:"
            echo "$failed_modules"
            exit 1
          else
            echo "All modules passed linting."
          fi
